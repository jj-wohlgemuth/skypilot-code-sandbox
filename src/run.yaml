name: joschkas_clowd

envs:
  AUTH_TOKEN:

service:
  readiness_probe:
    path: /health
    headers:
      Authorization: Bearer $AUTH_TOKEN

resources:
  ports: 8080
  cloud: aws
  region: us-east-1
  # If you want to use whisper and parakeet a lot use a GPU machine image_id: ami-0f4d5ef8f66860703, accelerators: A10G:1, instance_type: g5.xlarge
  any_of:
    - instance_type: c6a.16xlarge
    # c6i.4xlarge
    # - instance_type: m6in.4xlarge
    # - instance_type: c6in.8xlarge
    # - instance_type: m5n.8xlarge
    # - instance_type: m5zn.6xlarge

file_mounts:
  /bucket_data:
    source: r2://joschkas-clowd/ # or GCS, or Azure Blob Storage, or R2, etc.
  ~/.ssh/id_rsa: ~/.ssh/id_rsa
  ~/.ssh/id_rsa.pub: ~/.ssh/id_rsa.pub
  ~/.aws/config: ~/.aws/config
  ~/.env: .env

workdir: src

setup: |
  pip install -r requirements.txt

  # Fix SSH key permissions and add GitHub to known hosts
  chmod 600 ~/.ssh/id_rsa
  ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null

  # Source .env in interactive shells
  grep -qxF 'set -a && source ~/.env && set +a' ~/.bashrc || echo 'set -a && source ~/.env && set +a' >> ~/.bashrc

  # Install uv
  curl -LsSf https://astral.sh/uv/install.sh | sh

  # Install gh CLI for PR creation
  if ! command -v gh >/dev/null 2>&1; then
    curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
    echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
    sudo apt update && sudo apt install -y gh
  fi

  # Install Claude Code
  curl -fsSL https://claude.ai/install.sh | bash || true

  # Install AWS CLI v2 (v1 doesn't support SSO)
  if ! aws --version 2>&1 | grep -q 'aws-cli/2'; then
    curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
    unzip -q /tmp/awscliv2.zip -d /tmp
    sudo /tmp/aws/install --update
    rm -rf /tmp/awscliv2.zip /tmp/aws
  fi

  # Install build tools (gcc required for packages like pesq)
  sudo apt-get update && sudo apt-get install -y gcc build-essential

  # Install ffmpeg
  if ! command -v ffmpeg >/dev/null 2>&1; then
    sudo apt-get install -y ffmpeg
  fi

  # Install rclone for R2-backed Claude memory
  if ! command -v rclone >/dev/null 2>&1; then
    curl https://rclone.org/install.sh | sudo bash
  fi

  # Configure rclone for R2
  set -a && source ~/.env && set +a
  mkdir -p ~/.config/rclone
  printf '[r2]\ntype = s3\nprovider = Cloudflare\naccess_key_id = %s\nsecret_access_key = %s\nendpoint = %s\n' \
    "$R2_ACCESS_KEY_ID" "$R2_SECRET_ACCESS_KEY" "$R2_ENDPOINT" > ~/.config/rclone/rclone.conf

  # Mount R2 claude-memory/ to ~/.claude/ (persistent shared memory across instances)
  mkdir -p ~/.claude
  grep -qxF 'rclone mount r2:joschkas-clowd/claude-memory ~/.claude --daemon --allow-non-empty --vfs-cache-mode full' ~/.bashrc || \
    echo 'rclone mount r2:joschkas-clowd/claude-memory ~/.claude --daemon --allow-non-empty --vfs-cache-mode full' >> ~/.bashrc

run: |
  set -a && source ~/.env && set +a

  # Mount shared Claude memory from R2
  mkdir -p ~/.claude
  rclone mount r2:joschkas-clowd/claude-memory ~/.claude --daemon --allow-non-empty --vfs-cache-mode full

  fuser -k 8080/tcp || true
  python -m uvicorn api:app --host 0.0.0.0 --workers 4 --loop uvloop --port 8080
